<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkMe AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#080808;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:18px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
width:48px;
height:48px;
border-radius:16px;
background:linear-gradient(135deg,#00d4ff,#6f00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 0 20px rgba(0,212,255,0.5);
}

.title{
font-size:30px;
font-weight:bold;
letter-spacing:1px;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:85%;
padding:14px;
border-radius:18px;
font-size:16px;
line-height:1.5;
animation:fadeIn 0.3s ease;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.bot{
align-self:flex-start;
background:#1d1d1d;
}

.typing{
opacity:0.7;
font-style:italic;
}

.input-area{
display:flex;
gap:8px;
padding:12px;
background:#111;
border-top:1px solid #222;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#1b1b1b;
color:white;
font-size:16px;
}

button{
border:none;
padding:12px 14px;
border-radius:14px;
background:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(0.95);
}

.image-preview{
max-width:220px;
border-radius:14px;
margin-top:10px;
}

footer{
text-align:center;
padding:8px;
font-size:12px;
color:gray;
background:#111;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>

<div class="logo">🧠</div>

<div class="title">
ThinkMe AI
</div>

</header>

<div class="chat-container" id="chatContainer">

<div class="message bot">
👋 Hello! I am ThinkMe AI.<br>
Ask me anything.
</div>

</div>

<div class="input-area">

<input
type="text"
