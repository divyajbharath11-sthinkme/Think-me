<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkMe AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:16px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
width:50px;
height:50px;
border-radius:16px;
background:linear-gradient(135deg,#00d4ff,#6f00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
box-shadow:0 0 20px rgba(0,212,255,0.6);
}

.title{
font-size:28px;
font-weight:bold;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:14px;
scroll-behavior:smooth;
}

.message{
max-width:85%;
padding:14px;
border-radius:20px;
font-size:16px;
line-height:1.5;
word-wrap:break-word;
animation:fadeIn 0.3s ease;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
}

.bot{
align-self:flex-start;
background:#1a1a1a;
color:white;
}

.typing{
opacity:0.7;
font-style:italic;
}

.input-area{
display:flex;
padding:12px;
gap:10px;
background:#111;
border-top:1px solid #222;
position:sticky;
bottom:0;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:15px;
background:#1d1d1d;
color:white;
font-size:16px;
}

button{
width:60px;
border:none;
border-radius:15px;
background:white;
font-size:22px;
cursor:pointer;
font-weight:bold;
}

button:active{
transform:scale(0.95);
}

footer{
text-align:center;
padding:8px;
font-size:12px;
background:#111;
color:gray;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>
<div class="logo">🧠</div>
<div class="title">ThinkMe AI</div>
</header>

<div class="chat-container" id="chatContainer">

<div class="message bot">
👋 Hello! I am ThinkMe AI.<br><br>
Ask me anything.
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Type your message..."
autocomplete="off"
/>

<button onclick="sendMessage()">➤</button>

</div>

<footer>
ThinkMe AI © 2025
</footer>

<script>

const API_KEY = "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";

const chatContainer = document.getElementById("chatContainer");
const userInput = document.getElementById("userInput");

function addMessage(text, sender){

const msg = document.createElement("div");

msg.classList.add("message");

if(sender === "user"){
msg.classList.add("user");
}else{
msg.classList.add("bot");
}

msg.innerHTML = text;

chatContainer.appendChild(msg);

chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function sendMessage(){

const text = userInput.value.trim();

if(text === "") return;

addMessage(text, "user");

userInput.value = "";

const typing = document.createElement("div");

typing.classList.add("message","bot","typing");

typing.innerHTML = "Thinking...";

chatContainer.appendChild(typing);

chatContainer.scrollTop = chatContainer.scrollHeight;

try{

const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":"https://yourwebsite.github.io",
"X-Title":"ThinkMe AI"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[
{
role:"system",
content:"You are ThinkMe AI, a smart, friendly and intelligent AI assistant like ChatGPT. Give clear, useful and detailed answers."
},
{
role:"user",
content:text
}
]

})

});

const data = await response.json();

typing.remove();

if(data.choices && data.choices.length > 0){

const reply = data.choices[0].message.content;

addMessage(reply,"bot");

}else{

addMessage("⚠️ No response received.","bot");

}

}catch(error){

typing.remove();

addMessage("❌ Error: Check internet or API key.","bot");

}

}

userInput.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

</script>

</body>
</html>
