<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkMe AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:18px;
font-size:28px;
font-weight:bold;
background:#111;
border-bottom:1px solid #222;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
background:linear-gradient(135deg,#00bfff,#7b2fff);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:85%;
padding:14px;
border-radius:18px;
line-height:1.5;
font-size:16px;
animation:fadeIn 0.3s ease;
word-wrap:break-word;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.bot{
background:#1e1e1e;
align-self:flex-start;
}

.image-preview{
max-width:220px;
border-radius:14px;
margin-top:10px;
}

.input-area{
display:flex;
gap:8px;
padding:12px;
background:#111;
border-top:1px solid #222;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#1f1f1f;
color:white;
font-size:16px;
outline:none;
}

button{
border:none;
padding:12px 14px;
border-radius:14px;
background:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:active{
transform:scale(0.96);
}

.typing{
opacity:0.7;
font-style:italic;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

footer{
text-align:center;
padding:8px;
font-size:12px;
color:gray;
background:#111;
}

</style>
</head>

<body>

<header>
<div class="logo">🤖</div>
<div>ThinkMe AI</div>
</header>

<div class="chat-container" id="chatContainer">

<div class="message bot">
👋 Hello! I am ThinkMe AI.<br>
Ask me anything.
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask anything..."
>

<button onclick="sendMessage()">➤</button>

<button onclick="startVoice()">🎤</button>

<label for="imageInput">
<button>📷</button>
</label>

<input
type="file"
id="imageInput"
accept="image/*"
style="display:none"
onchange="uploadImage(event)"
>

</div>

<footer>
ThinkMe AI © 2026
</footer>

<script>

const API_KEY =
"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";

async function getAIResponse(message){

try{

const response = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",

headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-3.5-turbo",

messages:[
{
role:"system",
content:"You are ThinkMe AI, a smart, friendly and professional AI assistant."
},
{
role:"user",
content:message
}
]

})

});

const data = await response.json();

return data.choices[0].message.content;

}catch(error){

return "⚠️ Error connecting to AI.";

}

}

async function sendMessage(){

const input =
document.getElementById("userInput");

const chat =
document.getElementById("chatContainer");

const text = input.value.trim();

if(text==="") return;

const userMsg =
document.createElement("div");

userMsg.className =
"message user";

userMsg.innerHTML = text;

chat.appendChild(userMsg);

input.value = "";

const botMsg =
document.createElement("div");

botMsg.className =
"message bot typing";

botMsg.innerHTML =
"Thinking...";

chat.appendChild(botMsg);

chat.scrollTop =
chat.scrollHeight;

const reply =
await getAIResponse(text);

botMsg.classList.remove("typing");

botMsg.innerHTML = reply;

chat.scrollTop =
chat.scrollHeight;

}

function startVoice(){

const recognition =
new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.onresult = function(event){

document.getElementById(
"userInput"
).value =
event.results[0][0].transcript;

sendMessage();

};

recognition.start();

}

function uploadImage(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(){

const chat =
document.getElementById("chatContainer");

const imgMsg =
document.createElement("div");

imgMsg.className =
"message user";

imgMsg.innerHTML =
'<img src="' +
reader.result +
'" class="image-preview">';

chat.appendChild(imgMsg);

chat.scrollTop =
chat.scrollHeight;

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
